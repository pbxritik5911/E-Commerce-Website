{% extends 'base.html' %}

{% block content %}

<div class="card shadow-lg p-4 form-card">
    <h3 class="mb-3">Edit Contact</h3>

    <form method="POST">
        <div class="mb-3">
            <input type="text" name="name" value="{{ contact.name }}" class="form-control">
        </div>

        <div class="mb-3">
            <input type="text" name="phone" value="{{ contact.phone }}" class="form-control">
        </div>

        <div class="mb-3">
            <input type="email" name="email" value="{{ contact.email }}" class="form-control">
        </div>

        <button class="btn btn-primary w-100">Update Contact</button>
    </form>

</div>

{% endblock %}
