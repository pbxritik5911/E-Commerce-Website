{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>All Contacts</h2>
    <a href="/add" class="btn btn-primary">+ Add Contact</a>
</div>

<form method="GET" class="mb-4">
    <input type="text" name="search" class="form-control" placeholder="Search by name or phone...">
</form>

<div class="row">
    {% for contact in contacts %}
    <div class="col-md-4">
        <div class="card shadow-lg mb-4 contact-card">
            <div class="card-body">
                <h5 class="card-title">{{ contact.name }}</h5>
                <p class="card-text">
                    📞 {{ contact.phone }}<br>
                    ✉️ {{ contact.email }}
                </p>

                <a href="/edit/{{ contact.id }}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{ contact.id }}" class="btn btn-danger btn-sm">Delete</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
